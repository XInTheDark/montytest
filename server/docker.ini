###
# Container-friendly production configuration.
###

[app:main]
use = egg:montytest_server

pyramid.reload_templates = false
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = en

mako.directories = montytest:templates

montytest.port = %(http_port)s
montytest.primary_port = 6543

[server:main]
use = egg:waitress#main
host = 0.0.0.0
port = %(http_port)s

# In container platforms like Coolify, the reverse proxy is usually another
# container on the internal network instead of localhost. Trust the immediate
# proxy hop so Waitress can honor X-Forwarded-* headers and generate https URLs.
#
# If you expose this app directly to the internet, tighten this to the proxy IP
# or network instead of using "*".
trusted_proxy = *
trusted_proxy_count = 1
trusted_proxy_headers = x-forwarded-for x-forwarded-host x-forwarded-proto x-forwarded-port
clear_untrusted_proxy_headers = yes

connection_limit = 100
threads = 10

[loggers]
keys = root, montytest

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = ERROR
handlers = console

[logger_montytest]
level = WARN
handlers =
qualname = montytest

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s][%(threadName)s] %(message)s
