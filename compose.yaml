services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: ./server
    restart: unless-stopped
    init: true
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONTYTEST_HOST: mongo
      MONTYTEST_SECRET: ${MONTYTEST_SECRET:?set MONTYTEST_SECRET in your shell or a local .env file}
    ports:
      - "${MONTYTEST_HTTP_PORT:-6543}:6543"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6543/tests', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
